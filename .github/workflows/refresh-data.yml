name: refresh-data
on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install openpyxl

      - name: Fetch grid infrastructure (HIFLD / EIA)
        run: python pipeline/fetch_grid.py

      - name: Fetch ERCOT interconnection queue
        run: python pipeline/fetch_ercot.py

      - name: Fetch fiber / colo data (PeeringDB)
        run: python pipeline/fetch_fiber.py

      - name: Rebuild scores and web data
        run: python pipeline/build.py

      - name: Commit if changed
        run: |
          git config user.name "steradian-bot"
          git config user.email "actions@github.com"
          git add web/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: automated refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      # Bot pushes don't trigger the deploy-pages workflow (GITHUB_TOKEN
      # suppression), so deploy the freshly built site from this run directly.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
