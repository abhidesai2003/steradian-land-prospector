name: refresh-data
on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install openpyxl

      - name: Fetch grid infrastructure (HIFLD / EIA)
        run: python pipeline/fetch_grid.py

      - name: Fetch ERCOT interconnection queue
        run: python pipeline/fetch_ercot.py

      - name: Fetch fiber / colo data (PeeringDB)
        run: python pipeline/fetch_fiber.py

      - name: Rebuild scores and web data
        run: python pipeline/build.py

      - name: Commit if changed
        run: |
          git config user.name "steradian-bot"
          git config user.email "actions@github.com"
          git add web/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: automated refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
